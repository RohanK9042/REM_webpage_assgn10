<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REM Dashboard | Rohan Kurhekar</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #020617;
    color: white;
    transition: 0.4s;
}

/* LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

/* NAV */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.6);
    position: sticky;
    top: 0;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('https://images.unsplash.com/photo-1509395176047-4a66953fd231') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* BUTTON */
.toggle {
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

/* LIGHT MODE */
.light {
    background: #f1f5f9;
    color: black;
}

footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <h1>Loading REM...</h1>
</div>

<!-- NAV -->
<nav>
    <h2>REM Dashboard</h2>
    <div class="toggle" onclick="toggleMode()">🌗</div>
</nav>

<!-- HERO -->
<div class="hero">
    <h1 data-aos="zoom-in">Renewable Energy Dashboard 🌱</h1>
</div>

<!-- COUNTERS -->
<div class="grid">

<div class="card" data-aos="fade-up">
<h2 id="solar">0</h2>
<p>Solar Energy %</p>
</div>

<div class="card" data-aos="fade-up">
<h2 id="wind">0</h2>
<p>Wind Energy %</p>
</div>

<div class="card" data-aos="fade-up">
<h2 id="hydro">0</h2>
<p>Hydro Energy %</p>
</div>

</div>

<!-- CHARTS -->
<div class="grid">
<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<canvas id="chart2"></canvas>
</div>
</div>

<!-- PROJECT -->
<div class="grid">
<div class="card" data-aos="fade-right">
<h3>Project</h3>
<p>AI-based Renewable Energy Optimization System</p>
</div>

<div class="card" data-aos="fade-left">
<h3>Research</h3>
<p>Renewable Energy Management Paper (ISSN)</p>
</div>
</div>

<footer>
<p>Rohan Kurhekar | BE EXCS-A | REM</p>
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

/* LOADER */
window.onload = function() {
    document.getElementById("loader").style.display = "none";
}

/* DARK LIGHT MODE */
function toggleMode() {
    document.body.classList.toggle("light");
}

/* COUNTER ANIMATION */
let solar=0, wind=0, hydro=0;

let interval = setInterval(()=>{
    if(solar<40){solar++; document.getElementById("solar").innerText=solar;}
    if(wind<30){wind++; document.getElementById("wind").innerText=wind;}
    if(hydro<30){hydro++; document.getElementById("hydro").innerText=hydro;}
    if(solar>=40 && wind>=30 && hydro>=30) clearInterval(interval);
},50);

/* CHARTS */
new Chart(document.getElementById("chart1"), {
    type: 'pie',
    data: {
        labels: ['Solar','Wind','Hydro'],
        datasets: [{
            data: [40,30,30]
        }]
    }
});

new Chart(document.getElementById("chart2"), {
    type: 'line',
    data: {
        labels: ['Jan','Feb','Mar','Apr'],
        datasets: [{
            label: 'Energy Growth',
            data: [10,20,30,40]
        }]
    }
});
</script>

</body>
</html>
